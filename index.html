<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Projeto</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Orbitron,sans-serif;
    background:#080808;
    color:white;
    overflow-x:hidden;
}

/* GRID */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);

    background-size:50px 50px;
    pointer-events:none;
}

/* HERO */

.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:60px;
    padding:40px;
}

.left{
    max-width:550px;
}

.badge{
    display:inline-block;
    padding:10px 16px;
    border:1px solid #ff9ad0;
    border-radius:30px;
    color:#ff9ad0;
    margin-bottom:25px;
}

h1{
    font-size:5rem;
    line-height:1;
    color:#ffd1e8;

    text-shadow:
    0 0 10px #ff9ad0,
    0 0 30px #ff9ad0;
}

.subtitle{
    margin:30px 0;
    color:#ddd;
    line-height:1.8;
}

.buttons{
    display:flex;
    gap:15px;
}

.btn{
    padding:16px 30px;
    border-radius:14px;
    text-decoration:none;
    transition:.3s;
}

.primary{
    background:#ff9ad0;
    color:black;
    font-weight:bold;
}

.secondary{
    border:1px solid #ff9ad0;
    color:#ff9ad0;
}

.btn:hover{
    transform:translateY(-4px);
}

/* MONITOR */

.screen{
    width:550px;
    height:330px;

    background:#111;
    border:1px solid #ff9ad0;
    border-radius:20px;

    box-shadow:
    0 0 50px rgba(255,154,208,.2);

    padding:20px;
}

.fake-ui{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:15px;
}

.panel{
    height:110px;
    background:#181818;
    border-radius:12px;
    border:1px solid rgba(255,154,208,.3);
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:50px;
}

.card{
    background:#111;
    border:1px solid rgba(255,154,208,.4);
    border-radius:18px;
    padding:25px;

    box-shadow:
    0 0 20px rgba(255,154,208,.1);
}

.number{
    font-size:2rem;
    margin-top:10px;
    color:#ff9ad0;
}

/* MOBILE */

@media(max-width:1000px){

.hero{
    flex-direction:column;
    text-align:center;
}

.screen{
    width:100%;
    max-width:550px;
}

h1{
    font-size:3rem;
}

.stats{
    grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<section class="hero">

<div class="left">

<div class="badge">
MEU PROJETO
</div>

<h1>
Cyber<br>
Landing
</h1>

<p class="subtitle">
Uma landing page inspirada em interfaces futuristas,
com visual neon, fundo grid e componentes modernos.
</p>

<div class="buttons">
<a href="#" class="btn primary">DOWNLOAD</a>
<a href="#" class="btn secondary">COMO USAR</a>
</div>

</div>

<div class="screen">

<div style="color:#ff9ad0">
Sistema Online
</div>

<div class="fake-ui">
<div class="panel"></div>
<div class="panel"></div>
<div class="panel"></div>
<div class="panel"></div>
</div>

</div>

</section>

<section class="stats">

<div class="card">
Execuções
<div class="number">12.408</div>
</div>

<div class="card">
Velocidade
<div class="number">12ms</div>
</div>

<div class="card">
Status
<div class="number">ONLINE</div>
</div>

</section>

</body>
</html>
